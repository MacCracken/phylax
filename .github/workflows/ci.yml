name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Use the canonical scripts/install.sh from cyrius main. Reads
        # CYRIUS_VERSION from cyrius.cyml [package].cyrius so the pin lives
        # in one place. install.sh stages ~/.cyrius/versions/$VERSION/ and
        # symlinks ~/.cyrius/bin/ for PATH. Same pattern sigil uses.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          echo "CYRIUS_HOME=$HOME/.cyrius" >> "$GITHUB_ENV"

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        # cyrius.lock pins sakshi/sigil/majra/bote hashes; CI fails if a
        # resolved file's sha256 doesn't match the locked entry. Skip on
        # the first push that introduces a new dep before cyrius.lock is
        # generated and committed.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # cyrius fmt --check emits the formatted source to stdout;
        # diff against the file in-place to catch drift.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" --check 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint (advisory)
        # Advisory-only; tighten to fail-on-warning once standing
        # warnings are addressed.
        continue-on-error: true
        run: |
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr tests/*.fcyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f"
          done

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/phylax
          echo "phylax: $(wc -c < build/phylax) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/phylax | grep -q "7f45 4c46"

      - name: Cross-build aarch64 (best-effort)
        # Only when toolchain bundle includes cc5_aarch64. Currently
        # blocked at the cyrius-stdlib level: phylax's `shannon_entropy`
        # in `src/analyze.cyr` uses `f64_log2`, which `cc5_aarch64`
        # flags as `f64_log2 is x86-only for v5.6.0; aarch64 has no
        # native log2 — needs polyfill`. Full write-up + closeout
        # criteria in
        # docs/development/issues/2026-04-30-cyrius-stdlib-issues.md.
        # Marked best-effort so the rest of the CI gates green while
        # that's pending.
        continue-on-error: true
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with this Cyrius — skipping"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/phylax-aarch64
          file build/phylax-aarch64 | grep -q "aarch64" || {
            echo "ERROR: phylax-aarch64 is not aarch64 ELF"; exit 1; }
          echo "phylax-aarch64: $(wc -c < build/phylax-aarch64) bytes"

      - name: dist/ bundles are up-to-date
        # `cyrius distlib` emits dist/phylax.cyr from [lib] modules and
        # `cyrius distlib core` emits dist/phylax-core.cyr from [lib.core].
        # The unresolved-symbols warning is expected — consumers supply
        # their own stdlib (same pattern as majra, sakshi, libro).
        run: |
          cyrius distlib || true
          cyrius distlib core || true
          test -s dist/phylax.cyr      || { echo "FAIL: dist/phylax.cyr not produced"; exit 1; }
          test -s dist/phylax-core.cyr || { echo "FAIL: dist/phylax-core.cyr not produced"; exit 1; }
          echo "dist/phylax.cyr:      $(wc -l < dist/phylax.cyr) lines, $(wc -c < dist/phylax.cyr) bytes"
          echo "dist/phylax-core.cyr: $(wc -l < dist/phylax-core.cyr) lines, $(wc -c < dist/phylax-core.cyr) bytes"
          if ! git diff --exit-code dist/; then
            echo "FAIL: committed dist/ bundles are stale. Run 'cyrius distlib && cyrius distlib core' and commit."
            exit 1
          fi

      - name: Test
        run: |
          fail=0
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Bench
        # Non-fatal — bench numbers vary by runner.
        continue-on-error: true
        run: |
          for b in tests/*.bcyr; do
            [ -f "$b" ] || continue
            cyrius bench "$b"
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-x86_64
          path: build/phylax
          retention-days: 5

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # phylax is a threat detection engine — it parses untrusted
        # PE/ELF/archive bytes. Scan for patterns that should never
        # appear: shell-out, writes to system paths, unbounded stack
        # buffers, raw exec syscalls outside the orchestrator path.
        # Matches code lines only — comments (#) are skipped.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Shell-out is forbidden — phylax never executes user-supplied content.
          scan "sys_system"      '\bsys_system\s*\('
          scan "raw system()"    '\bsystem\s*\('
          # Writes to system paths — phylax only reads scan targets and writes
          # to its own quarantine/output trees.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64 KB) — force heap review.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr 2>/dev/null | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          # Informational counts — fd hygiene tracking.
          OPENS=$(grep -rn 'sys_open' src/ 2>/dev/null | awk -F: '
            { line=$3; sub(/^[[:space:]]+/,"",line);
              if (substr(line,1,1) != "#") print }' | wc -l)
          CLOSES=$(grep -rn 'sys_close' src/ 2>/dev/null | awk -F: '
            { line=$3; sub(/^[[:space:]]+/,"",line);
              if (substr(line,1,1) != "#") print }' | wc -l)
          echo "sys_open: $OPENS, sys_close: $CLOSES (informational)"
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md \
                   CODE_OF_CONDUCT.md LICENSE CLAUDE.md cyrius.cyml \
                   dist/phylax.cyr dist/phylax-core.cyr; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        # cyrius.cyml pulls package.version from VERSION via ${file:VERSION};
        # just check VERSION appears in CHANGELOG.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"
